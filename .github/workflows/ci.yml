name: CI

on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [master]

jobs:
  ci:
    name: Lint · Type-check · Build · Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -w @kryptos/web

      - name: Type-check
        run: npx tsc --noEmit --skipLibCheck -p apps/web/tsconfig.json

      - name: Build
        run: npm run build -w @kryptos/web
        env:
          # Build-time env stubs — real secrets live in Vercel
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          ADMIN_SECRET: ci-placeholder
          ADMIN_USERNAME: ci-placeholder
          ADMIN_EMAIL: ci@example.com
          RESEND_API_KEY: ci-placeholder
          ANTHROPIC_API_KEY: ci-placeholder
          SESSION_SECRET: ci-placeholder-session-secret-32chars
          STRIPE_SECRET_KEY: sk_test_ci-placeholder
          STRIPE_WEBHOOK_SECRET: whsec_ci-placeholder
          STRIPE_PRO_MONTHLY_PRICE_ID: price_ci_placeholder_monthly
          STRIPE_PRO_YEARLY_PRICE_ID: price_ci_placeholder_yearly
          SUPABASE_URL: https://ci-placeholder.supabase.co
          SUPABASE_ANON_KEY: ci-placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key
          REVENUECAT_WEBHOOK_AUTH: ci-placeholder-revenuecat-auth
          CRON_SECRET: ci-placeholder-cron-secret

      - name: Dependency audit
        run: npm audit --audit-level=high
