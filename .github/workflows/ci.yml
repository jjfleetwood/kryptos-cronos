name: CI

on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [master]

jobs:
  ci:
    name: Lint · Type-check · Build · Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit --skipLibCheck

      - name: Build
        run: npm run build
        env:
          # Build-time env stubs — real secrets live in Vercel
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          ADMIN_SECRET: ci-placeholder
          ADMIN_USERNAME: ci-placeholder
          ADMIN_EMAIL: ci@example.com
          RESEND_API_KEY: ci-placeholder
          ANTHROPIC_API_KEY: ci-placeholder

      - name: Dependency audit
        run: npm audit --audit-level=high
