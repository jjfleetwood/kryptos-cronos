name: Dev Agents (nightly)

# Runs the report-only dev agents (testing, content, code-health, format) on a
# schedule and files findings to the Development scrum board via
# POST /api/agent/report. All agents are read-only — they never change code.
#
# Setup (one-time):
#   1. In Vercel env: AGENTS_ENABLED=true and AGENT_REPORT_TOKEN=<secret> (then redeploy).
#   2. In GitHub → Settings → Secrets and variables → Actions:
#        - Secret  AGENT_REPORT_TOKEN  = the SAME value as the Vercel one
#        - (optional) Variable AGENT_REPORT_URL = https://www.kryptoscronos.com (the default;
#          must be the canonical www host — the apex redirects and drops the auth header)
#   3. Trigger manually once (Run workflow) to verify, then let the nightly schedule run.

on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC nightly
  workflow_dispatch: # manual trigger from the Actions tab

permissions:
  contents: read

jobs:
  agents:
    name: Run report-only dev agents → board
    runs-on: ubuntu-latest
    env:
      # Use the canonical www host directly — the apex (kryptoscronos.com) 308-redirects
      # to www, and Authorization headers are stripped across that redirect → 401.
      AGENT_REPORT_URL: ${{ vars.AGENT_REPORT_URL || 'https://www.kryptoscronos.com' }}
      AGENT_REPORT_TOKEN: ${{ secrets.AGENT_REPORT_TOKEN }}
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        working-directory: .
        run: npm ci

      - name: Deep Testing Agent (quizzes + CTFs)
        continue-on-error: true
        run: node scripts/test-agent.mjs --report

      - name: Content Integrity Agent
        continue-on-error: true
        run: node scripts/content-agent.mjs --report

      - name: Code Health Agent
        continue-on-error: true
        run: node scripts/code-health-agent.mjs --report

      - name: Prose Quality Agent (format + depth)
        continue-on-error: true
        run: node scripts/prose-quality-agent.mjs --report

      - name: i18n Coverage Agent
        continue-on-error: true
        run: node scripts/i18n-agent.mjs --report

      - name: Content Drift Agent
        continue-on-error: true
        run: node scripts/drift-agent.mjs --report

      - name: Docs Agent
        continue-on-error: true
        run: node scripts/docs-agent.mjs --report

      - name: Curriculum Structure Agent
        continue-on-error: true
        run: node scripts/curriculum-agent.mjs --report

      - name: Image Integrity Agent
        continue-on-error: true
        run: node scripts/image-agent.mjs --report

      - name: Security Hygiene Agent
        continue-on-error: true
        run: node scripts/security-agent.mjs --report
