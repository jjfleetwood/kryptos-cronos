name: Deep Content Author (nightly)

# Runs the supervised content-author Claude subagent every night to grind through
# the deep-content backlog — primarily authoring real per-module content for the
# Advanced Audit track (one domain per run), then deepening flagged prose. It is
# PR-only and NEVER merges, so a human still approves anything that reaches master.
#
# Schedule: 12:00 UTC = 04:00 PST (05:00 during PDT — GitHub cron is UTC, no DST).
# Sits well clear of the 07:00/07:30 UTC report fleet + subagent rotation.
#
# DORMANT until you set the repo secret ANTHROPIC_API_KEY (billed — each run spends
# Claude API credits). Without it the job logs a skip and exits clean.
#   - Test: Actions → this workflow → Run workflow (optionally name a target domain).

on:
  schedule:
    - cron: "0 12 * * *" # 04:00 America/Los_Angeles (PST)
  workflow_dispatch:
    inputs:
      target:
        description: "Optional: a specific domain slug or epoch to author (else next in priority)"
        type: string
        default: ""

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: nightly-content
  cancel-in-progress: false

jobs:
  author:
    name: Author one deep-content unit → PR
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      AGENT_REPORT_URL: ${{ vars.AGENT_REPORT_URL || 'https://www.kryptoscronos.com' }}
      AGENT_REPORT_TOKEN: ${{ secrets.AGENT_REPORT_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gate on API key (dormant without it)
        id: gate
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "No ANTHROPIC_API_KEY set — the content author is dormant. Skipping."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: npm ci

      - name: Git identity
        if: steps.gate.outputs.run == 'true'
        run: |
          git config user.name "kryptos-content-author[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Claude Code
        if: steps.gate.outputs.run == 'true'
        run: npm i -g @anthropic-ai/claude-code

      - name: Run content-author (content edits only — the workflow opens the PR)
        if: steps.gate.outputs.run == 'true'
        continue-on-error: true
        env:
          TARGET: ${{ github.event.inputs.target }}
        run: |
          PROMPT="Run tonight's deep-content authoring sweep using the 'content-author' subagent defined in .claude/agents/content-author.md. Follow its definition for the CONTENT: author ONE un-authored Advanced Audit domain (or, if the target names a curriculum epoch, do that epoch's prose-depth rewrite) to the IAM/VPM quality bar, then REGENERATE (audit work: 'node packages/core/scripts/gen-audit-track.mjs'; prose work: 'npm run gen:meta -w @kryptos/core') and GATE on 'npx tsc --noEmit --skipLibCheck -p apps/web/tsconfig.json' — it must pass. Make all edits ON DISK only: do NOT git commit, branch, push, or open a PR — a later workflow step does that. Write a single concise PR title (<=120 chars) to a file named '.agent-pr-title' at the repo root. Stay inside scope + forbidden zones (never edit aar-01, stage-flags, auth/payments/crypto/proxy)."
          if [ -n "$TARGET" ]; then PROMPT="$PROMPT  Target for this run: $TARGET"; fi
          # Claude only edits content + runs the generator/tsc — NO git/gh in the allowlist.
          # The deterministic step below owns commit + push + gh pr create, which is reliable
          # in CI and preserves the never-merge gate (it only ever opens a PR).
          claude -p "$PROMPT" \
            --permission-mode acceptEdits \
            --allowedTools "Read,Glob,Grep,Edit,Write,WebFetch,WebSearch,Bash(node:*),Bash(npx:*),Bash(npm run:*)" \
            --max-turns 120 \
            2>&1 | tail -100

      - name: Open a PR from the agent's changes
        if: steps.gate.outputs.run == 'true'
        env:
          TARGET: ${{ github.event.inputs.target }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then echo "No changes — nothing to PR."; exit 0; fi
          TITLE="$(head -1 .agent-pr-title 2>/dev/null | cut -c1-120)"
          [ -z "$TITLE" ] && TITLE="Deep Content Author: automated update${TARGET:+ ($TARGET)}"
          rm -f .agent-pr-title
          BRANCH="agent/content-${TARGET:-auto}-$(date -u +%Y%m%d%H%M%S)"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "$TITLE"
          git push -u origin "$BRANCH"
          gh pr create --base master --head "$BRANCH" --title "$TITLE" \
            --body "Automated content-author run (target: ${TARGET:-next in priority}). Generator + tsc gated before this PR. Review + merge — the agent never merges."
