<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300" role="img" aria-label="Kryptós CronOS">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#0f2027"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="300" fill="url(#bg)"/>
  <rect width="800" height="300" fill="url(#grid)"/>

  <!-- animated scan line -->
  <rect x="-260" y="0" width="260" height="300" fill="url(#shimmer)" opacity="0.6">
    <animate attributeName="x" from="-260" to="800" dur="3.2s" repeatCount="indefinite"/>
  </rect>

  <!-- emblem: watch-dial ring (brand mark) -->
  <g transform="translate(400 128)">
    <circle r="46" fill="none" stroke="#22d3ee" stroke-opacity="0.55" stroke-width="2.5"/>
    <circle r="38" fill="none" stroke="#818cf8" stroke-opacity="0.35" stroke-width="1.5"/>
    <circle r="3.5" fill="#22d3ee">
      <animate attributeName="fill-opacity" values="1;0.3;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <!-- hands -->
    <line x1="0" y1="0" x2="0" y2="-30" stroke="#e2e8f0" stroke-opacity="0.7" stroke-width="2.5" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="0" x2="22" y2="0" stroke="#22d3ee" stroke-opacity="0.8" stroke-width="2" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
    </line>
  </g>

  <text x="400" y="212" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="15" letter-spacing="6" fill="#94a3b8" fill-opacity="0.85">KRYPTÓS CRONOS</text>
  <text x="400" y="236" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="11" letter-spacing="2" fill="#475569">TRAINING VISUAL</text>
</svg>
